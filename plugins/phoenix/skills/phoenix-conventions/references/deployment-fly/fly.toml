# fly.toml — production deploy template.
#
# Edit:
#   - app = '...'                  → your Fly app name
#   - primary_region = 'iad'       → your Fly region
#   - [env].PHX_HOST               → your public hostname
#
# When you need always-on clustering (dns_cluster forming a BEAM cluster
# from boot), set:
#   auto_stop_machines = 'off'
#   auto_start_machines = false
#   min_machines_running = 2
# The defaults below are the saner low-cost option (one machine, stop on
# idle, start on demand).

app = 'myapp'
primary_region = 'iad'
kill_signal = 'SIGTERM'

[build]

[deploy]
  release_command = '/app/bin/migrate'

[env]
  PHX_HOST = 'your-app.example.com'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
